spring:
  application:
    name: lookGo-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  endpoint:
    health:
      show-details: always

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true

rail:
  proxy:
    # 繞過內網的 SSL 憑證驗證
    host: ${RAIL_PROXY_HOST}
    port: ${RAIL_PROXY_PORT}
  api:
    tdx:
      base-url: https://tdx.transportdata.tw/api/basic # 整個網域 # 不含 /v2/Rail/Metro
      token-url: https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token
      client:
        id: ${TDX_CLIENT_ID}
        secret: ${TDX_CLIENT_SECRET}
      rail:
        system: TRTC # 目的: 方便之後更換或支援多個

app:
  admin:
    email: admin@example.com
    username: admin
    password: ${ADMIN_PASSWORD}
  # sendgrid:
  #   api:
  #     key: ${SENDGRID_API_KEY}
  #   from:
  #     email: test@domain.com
  #     name: LookGo
  #   sandbox:
  #     mode: true

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:8081}

logging:
  level:
    com.mli.lookgo.module.auth.security: DEBUG
    com.mli.lookgo.module.user.controller: DEBUG
