spring:
  application:
    name: lookGo-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

management:
  endpoint:
    health:
      show-details: always

mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true

rail:
  proxy:
    # 公司內網需設定 proxy 繞過 SSL 憑證驗證；個人裝置不設定則跳過 proxy
    host: ${RAIL_PROXY_HOST:}
    port: ${RAIL_PROXY_PORT:0}
  api:
    tdx:
      client:
        id: ${TDX_CLIENT_ID}
        secret: ${TDX_CLIENT_SECRET}

app:
  admin:
    email: admin@example.com
    username: admin
    password: ${ADMIN_PASSWORD}
    cellphone: "0123456789"
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # sendgrid:
  #   api:
  #     key: ${SENDGRID_API_KEY}
  #   from:
  #     email: test@domain.com
  #     name: LookGo
  #   sandbox:
  #     mode: true

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:8081}

logging:
  level:
    com.mli: DEBUG
    # 塞入大量資料時，Dao 層印出 INFO 即可
    com.mli.lookgo.module.metro.dao: INFO
    com.mli.lookgo.module.user.dao: INFO
    com.mli.lookgo.module.auth.dao: INFO
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.web.socket: DEBUG
